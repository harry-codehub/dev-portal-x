name: Deploy Azure Functions

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'DevNews.Functions'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore DevNews.sln

      - name: Build solution
        run: dotnet build DevNews.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test DevNews.UnitTests/DevNews.UnitTests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish Functions project
        run: dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/DevNews.Functions.csproj --configuration Release --output ./publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ./publish

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./publish

      - name: Deploy to Azure Functions (Dev)
        uses: Azure/functions-action@v1
        with:
          app-name: 'func-dewnews-api-dev'
          package: './publish'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_DEV }}

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./publish

      - name: Deploy to Azure Functions (Prod)
        uses: Azure/functions-action@v1
        with:
          app-name: 'func-dewnews-api-prod'
          package: './publish'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PROD }}
